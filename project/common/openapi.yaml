openapi: 3.0.0
info:
  title: Canton Invoice Financing API
  description: API for peer-to-peer invoice financing with competitive sealed-bid auctions on Canton Network
  version: 2.0.0

tags:
  - name: Feature Flags
  - name: Auth
  - name: Admin
  - name: App Installs
  - name: App Installs Requests
  - name: Licenses
  - name: licenses Renewal Requests
  - name: Invoice Finance
  - name: Financing Auctions
  - name: Financed Invoices
  - name: Sprint Boost

paths:
  /feature-flags:
    get:
      tags: [Feature Flags]
      summary: Get feature flags
      operationId: getFeatureFlags
      responses:
        '200':
          description: A list of feature flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlags'
        '500':
          $ref: '#/components/responses/InternalError'
  /login-links:
    get:
      tags: [Auth]
      summary: Get list of links that initiate login
      operationId: listLinks
      responses:
        '200':
          description: Links that initiate login flows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoginLink'
        '500':
          $ref: '#/components/responses/InternalError'

  /user:
    get:
      tags: [Auth]
      summary: Get Authenticated User
      operationId: getAuthenticatedUser
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/register:
    post:
      tags: [Auth]
      summary: Self-register a new Company or Institution user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelfRegistrationRequest'
      responses:
        '201':
          description: User registered and profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfRegistrationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '501':
          description: Not supported in OAuth2 mode
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/tenant-registrations:
    get:
      tags: [Admin]
      summary: List all Tenant Registrations
      operationId: listTenantRegistrations
      responses:
        '200':
          description: A list of Tenant Registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantRegistration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Admin]
      summary: Create Tenant Registration
      operationId: createTenantRegistration
      requestBody:
        description: Tenant Registration object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRegistrationRequest'
            examples:
              oauth2:
                value:
                  tenantId: "tenant-123"
                  partyId: "party-abc"
                  walletUrl: "http://wallet.localhost:2000/"
                  clientId: "client-xyz"
                  issuerUrl: "http://keycloak.localhost:8082/realms/AppProvider"
                  internal: false
              sharedSecret:
                value:
                  tenantId: "tenant-ss"
                  partyId: "party-ss"
                  walletUrl: "http://wallet.localhost:2000/"
                  users: [ "alice","bob" ]
                  internal: true
      responses:
        '201':
          description: Registration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRegistration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/tenant-registrations/{tenantId}:
    delete:
      tags: [Admin]
      summary: Delete Tenant Registration
      operationId: deleteTenantRegistration
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '204':
          description: Tenant registration deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /app-install-requests:
    get:
      tags: [App Installs Requests]
      summary: List all AppInstallRequests
      operationId: listAppInstallRequests
      responses:
        '200':
          description: A list of AppInstallRequests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppInstallRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /app-install-requests/{contractId}:accept:
    post:
      tags: [App Installs Requests]
      summary: Accept an AppInstallRequest
      operationId: acceptAppInstallRequest
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: Acceptance parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstallRequestAccept'
      responses:
        '201':
          description: AppInstall created from request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstall'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /app-install-requests/{contractId}:reject:
    post:
      tags: [App Installs Requests]
      summary: Reject an AppInstallRequest
      operationId: rejectAppInstallRequest
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: Rejection parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstallRequestReject'
      responses:
        '204':
          description: AppInstallRequest rejected
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /app-installs:
    get:
      tags: [ App Installs ]
      summary: List all AppInstalls
      operationId: listAppInstalls
      responses:
        '200':
          description: A list of AppInstalls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppInstall'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /app-installs/{contractId}:create-license:
    post:
      tags: [App Installs]
      summary: Create a License using the AppInstall
      operationId: createLicense
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: License creation parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstallCreateLicenseRequest'
      responses:
        '201':
          description: License created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstallCreateLicenseResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /app-installs/{contractId}:cancel:
    post:
      tags: [App Installs]
      summary: Cancel an AppInstall
      operationId: cancelAppInstall
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: Cancellation parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstallCancel'
      responses:
        '204':
          description: AppInstall canceled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /licenses:
    get:
      tags: [Licenses]
      summary: List all Licenses (including renewal requests)
      operationId: listLicenses
      responses:
        '200':
          description: A list of Licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/License'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /licenses/{contractId}:renew:
    post:
      tags: [Licenses]
      summary: Renew a License
      operationId: renewLicense
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: License renewal parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseRenewRequest'
      responses:
        '201':
          description: Renewal offer/payment request created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /licenses/{contractId}:complete-renewal:
    post:
      tags: [Licenses]
      summary: Complete the License Renewal
      operationId: completeLicenseRenewal
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: Complete license renewal parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteLicenseRenewalRequest'
      responses:
        '200':
          description: License renewed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseRenewalResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /licenses/{contractId}:expire:
    post:
      tags: [Licenses]
      summary: Expire a License
      operationId: expireLicense
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        description: Expiration parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseExpireRequest'
      responses:
        '200':
          description: License expired
          content:
            text/plain:
              schema:
                type: string
                nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /license-renewal-requests/{contractId}:withdraw:
    post:
      tags: [licenses Renewal Requests]
      summary: Withdraw an LicenseRenewalRequest
      operationId: withdrawLicenseRenewalRequest
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '204':
          description: LicenseRenewalRequest withdrawn
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────────────────────────────────────────────────────
  # DEADLINE DERBY — Invoice Finance Endpoints
  # ─────────────────────────────────────────────────────────────────────────

  /invoices:
    get:
      tags: [Invoice Finance]
      summary: List all Invoices visible to the authenticated party
      operationId: listInvoices
      responses:
        '200':
          description: A list of Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Invoice Finance]
      summary: Supplier creates a new Invoice
      operationId: createInvoice
      parameters:
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /invoices/{contractId}:
    delete:
      tags: [Invoice Finance]
      summary: Cancel (delete) an Invoice that has not yet entered auction
      operationId: deleteInvoice
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '204':
          description: Invoice cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /invoices/{contractId}:confirm:
    post:
      tags: [Invoice Finance]
      summary: Buyer confirms an Invoice (goods delivered)
      operationId: confirmInvoice
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Invoice confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /invoices/{contractId}:start-auction:
    post:
      tags: [Invoice Finance]
      summary: Supplier starts a Dutch auction for a confirmed Invoice
      operationId: startAuction
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAuctionRequest'
      responses:
        '201':
          description: Auction started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancingAuctionDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions:
    get:
      tags: [Financing Auctions]
      summary: List all Auctions visible to the authenticated party
      operationId: listAuctions
      responses:
        '200':
          description: A list of Financing Auctions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancingAuctionDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions/{contractId}:grab:
    post:
      tags: [Financing Auctions]
      summary: Bank grabs an Invoice from the auction at the current rate
      operationId: grabAuction
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrabAuctionRequest'
      responses:
        '201':
          description: Bid placed — winning bid and financed invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrabAuctionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions/{contractId}:bid:
    post:
      tags: [Financing Auctions]
      summary: Institution places or updates a sealed bid on an auction
      operationId: placeBid
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBidRequest'
      responses:
        '200':
          description: Bid placed or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceBidResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions/{contractId}/my-bid-status:
    get:
      tags: [Financing Auctions]
      summary: Returns the calling institution's current bid status on this auction
      operationId: getMyBidStatus
      parameters:
        - $ref: '#/components/parameters/ContractId'
      responses:
        '200':
          description: Current bid status for the authenticated institution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidStatusDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions/{contractId}:close:
    post:
      tags: [Financing Auctions]
      summary: Company closes the auction — backend picks winning bid and settles on ledger
      operationId: closeAuction
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Auction closed and winning bid settled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseAuctionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /auctions/{contractId}:cancel:
    post:
      tags: [Financing Auctions]
      summary: Cancel an open Auction (operator / supplier action)
      operationId: cancelAuction
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '204':
          description: Auction cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /financed-invoices:
    get:
      tags: [Financed Invoices]
      summary: List all Financed Invoices visible to the authenticated party
      operationId: listFinancedInvoices
      responses:
        '200':
          description: A list of Financed Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancedInvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /financed-invoices/{contractId}:pay:
    post:
      tags: [Financed Invoices]
      summary: Buyer pays a Financed Invoice at maturity
      operationId: payFinancedInvoice
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      responses:
        '200':
          description: Invoice paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaidInvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /financed-invoices/{contractId}:sprint-boost:
    post:
      tags: [Sprint Boost]
      summary: Buyer activates Sprint Boost (offers early payment in exchange for a bounty)
      operationId: activateSprintBoost
      parameters:
        - $ref: '#/components/parameters/ContractId'
        - $ref: '#/components/parameters/CommandId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SprintBoostRequest'
      responses:
        '200':
          description: Sprint Boost activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancedInvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /bank-ownerships:
    get:
      tags: [Financed Invoices]
      summary: List BankOwnership contracts — shows purchase rate (bank + operator only)
      operationId: listBankOwnerships
      responses:
        '200':
          description: A list of BankOwnership contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankOwnershipDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /paid-invoices:
    get:
      tags: [Financed Invoices]
      summary: List all Paid Invoices visible to the authenticated party
      operationId: listPaidInvoices
      responses:
        '200':
          description: A list of Paid Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaidInvoiceDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Invoice Parse (AI) ──────────────────────────────────────────────────────

  /invoices/parse:
    post:
      tags: [Invoice Finance]
      summary: Parse invoice from base64-encoded image/PDF using AI
      operationId: parseInvoice
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParseInvoiceRequest'
      responses:
        '200':
          description: Parsed invoice fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParsedInvoiceDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── User Profiles ────────────────────────────────────────────────────────────

  /profile:
    get:
      tags: [Auth]
      summary: Get current user's profile
      operationId: getMyProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Auth]
      summary: Create or update current user's profile
      operationId: upsertMyProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /profiles/{partyId}:
    get:
      tags: [Auth]
      summary: Get a user profile by party ID
      operationId: getProfile
      security:
        - BearerAuth: []
      parameters:
        - name: partyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    ContractId:
      name: contractId
      in: path
      required: true
      description: Ledger contract ID
      schema:
        type: string
    CommandId:
      name: commandId
      in: query
      required: true
      description: The command ID for the ledger transaction
      schema:
        type: string
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Not authenticated
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict with current state of the resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: An internal server error occurred
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    TenantRegistrationRequest:
      type: object
      required:
        - tenantId
        - partyId
        - walletUrl
      properties:
        tenantId:
          type: string
        partyId:
          type: string
        walletUrl:
          type: string
        clientId:
          type: string
          description: Required when authMode is oauth2
        issuerUrl:
          type: string
          description: Required when authMode is oauth2
        users:
          type: array
          description: Required (non-empty) when authMode is shared-secret
          items:
            type: string

    TenantRegistration:
      type: object
      required:
        - tenantId
        - partyId
        - walletUrl
        - internal
      properties:
        tenantId:
          type: string
          description: Tenant identifier
        partyId:
          type: string
          description: Party identifier
        walletUrl:
          type: string
          description: Wallet URL for payment redirects
          format: uri
        clientId:
          type: string
          description: OAuth2 client identifier
        issuerUrl:
          type: string
          description: Issuer URL
          format: uri
        internal:
          type: boolean
          description: Internal registration
        users:
          type: array
          items:
            type: string
    AuthenticatedUser:
      type: object
      required:
        - name
        - party
        - roles
        - isAdmin
        - walletUrl
      properties:
        name:
          type: string
        party:
          type: string
        roles:
          type: array
          items:
            type: string
        isAdmin:
          type: boolean
        walletUrl:
          type: string

    LoginLink:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
        url:
          type: string
        registrationUrl:
          type: string
          description: Keycloak registration URL for new user sign-up (OAuth2 mode only)

    AppInstallRequest:
      type: object
      required:
        - contractId
        - provider
        - user
        - meta
      properties:
        contractId:
          type: string
        provider:
          type: string
        user:
          type: string
        meta:
          $ref: '#/components/schemas/Metadata'

    AppInstallRequestAccept:
      type: object
      required:
        - installMeta
        - meta
      properties:
        installMeta:
          $ref: '#/components/schemas/Metadata'
        meta:
          $ref: '#/components/schemas/Metadata'

    AppInstallRequestReject:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/Metadata'

    AppInstallRequestCancel:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/Metadata'

    AppInstall:
      type: object
      required:
        - contractId
        - provider
        - user
        - meta
        - numLicensesCreated
        - licenseNum
      properties:
        contractId:
          type: string
        provider:
          type: string
        user:
          type: string
        meta:
          $ref: '#/components/schemas/Metadata'
        numLicensesCreated:
          type: integer
        licenseNum:
          type: integer

    AppInstallCreateLicenseRequest:
      type: object
      required:
        - params
      properties:
        params:
          $ref: '#/components/schemas/LicenseParams'

    AppInstallCreateLicenseResult:
      type: object
      properties:
        installId:
          type: string
        licenseId:
          type: string

    AppInstallCancel:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/Metadata'

    LicenseParams:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Metadata'

    License:
      type: object
      required:
        - contractId
        - provider
        - user
        - params
        - expiresAt
        - licenseNum
        - isExpired
      properties:
        contractId:
          type: string
        provider:
          type: string
        user:
          type: string
        params:
          $ref: '#/components/schemas/LicenseParams'
        expiresAt:
          type: string
          format: date-time
        licenseNum:
          type: integer
        isExpired:
          type: boolean
        renewalRequests:
          type: array
          items:
            $ref: '#/components/schemas/LicenseRenewalRequest'

    Metadata:
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            type: string

    LicenseRenewRequest:
      type: object
      description: Parameters used to initiate a license renewal.
      required:
        - licenseFeeCc
        - licenseExtensionDuration
        - prepareUntilDuration
        - settleBeforeDuration
        - description
      properties:
        licenseFeeCc:
          type: number
          description: License fee amount
        licenseExtensionDuration:
          type: string
          description: "ISO-8601 duration specifying the requested extension period (e.g. 'P30D' for 30 days)."
        prepareUntilDuration:
          type: string
          description: "ISO-8601 duration after which the allocation request will be not accepted."
        settleBeforeDuration:
          type: string
          description: "ISO-8601 duration within which the transfer must be settled."
        description:
          type: string
          description: Human-readable explanation of the renewal request.

    LicenseRenewalResult:
      type: object
      properties:
        licenseId:
          type: string

    LicenseRenewalRequest:
      type: object
      required:
          - contractId
          - provider
          - user
          - licenseNum
          - licenseFeeAmount
          - licenseFeeInstrument
          - licenseExtensionDuration
          - prepareUntil
          - settleBefore
          - requestedAt
          - description
          - requestId
          - prepareDeadlinePassed
          - settleDeadlinePassed
      properties:
        contractId:
          type: string
        provider:
          type: string
        user:
          type: string
        licenseNum:
          type: integer
        licenseFeeAmount:
          type: number
        licenseFeeInstrument:
          type: string
        licenseExtensionDuration:
          type: string
          description: "RelTime representing how long the license should be extended."
        prepareUntil:
            type: string
            format: date-time
            description: "The time until the license renewal request can be prepared."
        settleBefore:
            type: string
            format: date-time
            description: "The time before which the payment must be settled."
        requestedAt :
          type: string
          format: date-time
          description: "The time until the license renewal request can be prepared."
        description:
          type: string
        requestId:
          type: string
        allocationCid:
          type: string
        prepareDeadlinePassed:
          type: boolean
        settleDeadlinePassed:
          type: boolean

    LicenseExpireRequest:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/Metadata'

    CompleteLicenseRenewalRequest:
      type: object
      required:
        - renewalRequestContractId
        - allocationContractId
      properties:
        renewalRequestContractId:
          type: string
          description: The contract ID of the LicenseRenewalRequest to complete
        allocationContractId:
          type: string
          description: The contract ID of the accepted allocation

    FeatureFlags:
      type: object
      properties:
        authMode:
          type: string
          enum:
            - oauth2
            - shared-secret

    # ── Deadline Derby Schemas ──────────────────────────────────────────────

    CreateInvoiceRequest:
      type: object
      required:
        - invoiceId
        - buyerParty
        - amount
        - description
        - paymentTermDays
        - issueDate
        - dueDate
      properties:
        invoiceId:
          type: string
          example: "INV-2025-0001"
        buyerParty:
          type: string
          description: Canton party ID of the buyer
        amount:
          type: number
          format: double
          example: 100000.00
        description:
          type: string
          example: "10,000 steel bolts"
        paymentTermDays:
          type: integer
          example: 90
        issueDate:
          type: string
          format: date
          example: "2025-01-01"
        dueDate:
          type: string
          format: date
          example: "2025-04-01"

    InvoiceDto:
      type: object
      required:
        - contractId
        - operator
        - supplier
        - buyer
        - invoiceId
        - amount
        - description
        - paymentTermDays
        - issueDate
        - dueDate
        - status
      properties:
        contractId:
          type: string
        operator:
          type: string
        supplier:
          type: string
        buyer:
          type: string
        invoiceId:
          type: string
        amount:
          type: number
          format: double
        description:
          type: string
        paymentTermDays:
          type: integer
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [PENDING_CONFIRMATION, CONFIRMED, IN_AUCTION, FINANCED, PAID]

    StartAuctionRequest:
      type: object
      required:
        - eligibleBanks
        - startRate
        - reserveRate
        - auctionDurationSecs
      properties:
        eligibleBanks:
          type: array
          items:
            type: string
          description: Canton party IDs of eligible banks (auto-populated if empty)
        startRate:
          type: number
          format: double
          description: Starting advance rate (e.g. 98.0 = 98%)
          example: 98.0
        reserveRate:
          type: number
          format: double
          description: Minimum advance rate (floor)
          example: 95.0
        auctionDurationSecs:
          type: integer
          description: Duration of auction in seconds (use auctionDurationDays for day-based input)
          example: 60
        auctionDurationDays:
          type: integer
          description: >
            Duration of auction in days (1 to days until invoice expiry).
            If provided, takes precedence over auctionDurationSecs.
          example: 7
          nullable: true

    FinancingAuctionDto:
      type: object
      required:
        - contractId
        - operator
        - supplier
        - buyer
        - invoiceId
        - amount
        - description
        - dueDate
        - startRate
        - reserveRate
        - auctionDurationSecs
        - eligibleBanks
        - status
      properties:
        contractId:
          type: string
        operator:
          type: string
        supplier:
          type: string
        buyer:
          type: string
        invoiceId:
          type: string
        amount:
          type: number
          format: double
        description:
          type: string
        dueDate:
          type: string
          format: date
        startRate:
          type: number
          format: double
        reserveRate:
          type: number
          format: double
        auctionDurationSecs:
          type: integer
        eligibleBanks:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [OPEN, CLOSED]
        currentBestRate:
          type: number
          format: double
          description: >
            Current lowest rate offered across all sealed bids (from in-memory store).
            Visible to the supplier and all eligible institutions. Never reveals who bid.
          nullable: true
        bidCount:
          type: integer
          description: >
            Number of distinct bids placed. Only shown to the company running the auction.
          nullable: true
        auctionEndTime:
          type: string
          format: date-time
          description: When the auction expires (creation time + duration)
          nullable: true

    GrabAuctionRequest:
      type: object
      required:
        - bankParty
        - offeredRate
      properties:
        bankParty:
          type: string
          description: Canton party ID of the bidding bank
        offeredRate:
          type: number
          format: double
          description: The advance rate the bank accepts (e.g. 97.6)
          example: 97.6

    GrabAuctionResult:
      type: object
      properties:
        winningBidContractId:
          type: string
        financedInvoiceContractId:
          type: string
        bankOwnershipContractId:
          type: string
        purchaseRate:
          type: number
          format: double
        purchaseAmount:
          type: number
          format: double

    FinancedInvoiceDto:
      type: object
      required:
        - contractId
        - operator
        - supplier
        - buyer
        - bank
        - invoiceId
        - amount
        - description
        - dueDate
        - paymentStatus
        - sprintBoostActive
        - sprintBoostBounty
      properties:
        contractId:
          type: string
        operator:
          type: string
        supplier:
          type: string
        buyer:
          type: string
        bank:
          type: string
        invoiceId:
          type: string
        amount:
          type: number
          format: double
          description: Face value — what the buyer owes (NOT the bank's purchase price)
        description:
          type: string
        dueDate:
          type: string
          format: date
        paymentStatus:
          type: string
          enum: [ACTIVE, SPRINT_BOOST_ACTIVE, PAID]
        sprintBoostActive:
          type: boolean
        sprintBoostBounty:
          type: number
          format: double

    SprintBoostRequest:
      type: object
      required:
        - bountyAmount
      properties:
        bountyAmount:
          type: number
          format: double
          description: Bounty amount the buyer receives for early payment
          example: 400.00

    BankOwnershipDto:
      type: object
      required:
        - contractId
        - operator
        - bank
        - invoiceId
        - purchaseRate
        - purchaseAmount
        - faceValue
      properties:
        contractId:
          type: string
        operator:
          type: string
        bank:
          type: string
        invoiceId:
          type: string
        purchaseRate:
          type: number
          format: double
          description: Confidential — advance rate the bank paid (e.g. 97.6%)
        purchaseAmount:
          type: number
          format: double
          description: Confidential — actual cash bank transferred to supplier
        faceValue:
          type: number
          format: double
          description: Invoice face value (what buyer owes)

    PaidInvoiceDto:
      type: object
      required:
        - contractId
        - operator
        - supplier
        - buyer
        - bank
        - invoiceId
        - amount
        - description
        - sprintBoosted
        - bountyPaid
      properties:
        contractId:
          type: string
        operator:
          type: string
        supplier:
          type: string
        buyer:
          type: string
        bank:
          type: string
        invoiceId:
          type: string
        amount:
          type: number
          format: double
        description:
          type: string
        sprintBoosted:
          type: boolean
        bountyPaid:
          type: number
          format: double

    ParseInvoiceRequest:
      type: object
      required: [fileBase64, mimeType]
      properties:
        fileBase64:
          type: string
          description: Base64-encoded file content
        mimeType:
          type: string
          description: MIME type (image/jpeg, image/png, application/pdf)

    ParsedInvoiceDto:
      type: object
      properties:
        invoiceNumber:
          type: string
        vendorName:
          type: string
        buyerName:
          type: string
        amount:
          type: number
          format: double
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        description:
          type: string
        confidence:
          type: number
          format: double
          description: Confidence score 0-1

    UserProfileDto:
      type: object
      properties:
        partyId:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum: [COMPANY, INSTITUTION]
        sector:
          type: string
          description: Industry sector (e.g. Manufacturing, Technology, Finance)
        annualRevenue:
          type: number
          format: double
          description: Annual revenue in USD
        employeeCount:
          type: integer
        foundedYear:
          type: integer
        description:
          type: string
        website:
          type: string

    UpdateProfileRequest:
      type: object
      required: [displayName, type]
      properties:
        displayName:
          type: string
        type:
          type: string
          enum: [COMPANY, INSTITUTION]
        sector:
          type: string
        annualRevenue:
          type: number
          format: double
        employeeCount:
          type: integer
        foundedYear:
          type: integer
        description:
          type: string
        website:
          type: string

    # ── Sealed-Bid Auction Schemas ────────────────────────────────────────────

    PlaceBidRequest:
      type: object
      required:
        - offeredRate
      properties:
        offeredRate:
          type: number
          format: double
          description: >
            The advance rate this institution is willing to offer
            (e.g. 97.5 means they will advance 97.5% of the face value).
            Lower rate = better bid = more likely to win.
          example: 97.5

    PlaceBidResult:
      type: object
      required:
        - isCurrentBestBid
        - currentBestRate
      properties:
        isCurrentBestBid:
          type: boolean
          description: True if this bid is currently the best (lowest rate)
        currentBestRate:
          type: number
          format: double
          description: The current best rate across all bids (rounded; never reveals whose)

    BidStatusDto:
      type: object
      required:
        - hasBid
        - isWinning
      properties:
        hasBid:
          type: boolean
          description: True if the authenticated institution has placed a bid
        isWinning:
          type: boolean
          description: True if this institution holds the current best bid
        myRate:
          type: number
          format: double
          description: The rate this institution submitted (only returned to the bidder)
          nullable: true
        currentBestRate:
          type: number
          format: double
          description: The best rate in the pool (visible to all eligible institutions)
          nullable: true

    CloseAuctionResult:
      type: object
      required:
        - noWinner
      properties:
        noWinner:
          type: boolean
          description: True when no bids were placed and auction was cancelled
        winningInstitutionPartyId:
          type: string
          description: Party ID of the winning institution (revealed to company only)
          nullable: true
        winningInstitutionDisplayName:
          type: string
          description: Display name of winning institution (if profile exists)
          nullable: true
        winningRate:
          type: number
          format: double
          description: The winning advance rate
          nullable: true
        financedInvoiceContractId:
          type: string
          nullable: true
        purchaseAmount:
          type: number
          format: double
          description: Amount paid to the supplier by the winning institution
          nullable: true

    SelfRegistrationRequest:
      type: object
      required:
        - username
        - password
        - displayName
        - type
      properties:
        username:
          type: string
          example: "acme-corp"
        password:
          type: string
          format: password
          example: "secret123"
        displayName:
          type: string
          example: "Acme Corporation"
        type:
          type: string
          enum: [COMPANY, INSTITUTION]
          example: "COMPANY"
        sector:
          type: string
          example: "Manufacturing"
          nullable: true
        annualRevenue:
          type: number
          format: double
          nullable: true
        employeeCount:
          type: integer
          nullable: true
        foundedYear:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true

    SelfRegistrationResult:
      type: object
      required:
        - partyId
        - username
        - profile
      properties:
        partyId:
          type: string
          description: Canton party ID allocated for this user
        username:
          type: string
        profile:
          $ref: '#/components/schemas/UserProfileDto'

    # ── Original Schemas (unchanged) ─────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          nullable: true
          example: "TenantId is required"